apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharma-api
  namespace: pharma
  labels:
    app: pharma-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pharma-api
  template:
    metadata:
      labels:
        app: pharma-api
    spec:
      containers:
        - name: pharma-api
          image: <registry_name>/pharma-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: pharma-secrets
            - configMapRef:
                name: pharma-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: pharma-api-svc
  namespace: pharma
  labels:
    app: pharma-api
spec:
  type: ClusterIP
  selector:
    app: pharma-api
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
