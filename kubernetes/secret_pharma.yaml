---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pharma-secrets
  namespace: pharma
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ovhcloud-store
    kind: ClusterSecretStore
  target:
    name: pharma-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: staging/database
        property: DATABASE_URL
    - secretKey: DATABASE_URL_SYNC
      remoteRef:
        key: staging/database
        property: DATABASE_URL_SYNC
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: staging/openrouter
        property: OPENROUTER_API_KEY
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: staging/api
        property: JWT_SECRET_KEY


---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pharma-config
  namespace: pharma
data:
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: pharma
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }

    http {
      # Désactiver le buffering par défaut pour le SSE
      proxy_buffering off;

      upstream pharma_api {
        server pharma-api-svc:8000;
      }

      server {
        listen 80;

        location / {
          proxy_pass         http://pharma_api;
          proxy_http_version 1.1;

          # Headers standards
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;

          # SSE : désactiver le cache et allonger le timeout
          proxy_cache        off;
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;

          # Empêche nginx de bufferiser la réponse (SSE)
          add_header         X-Accel-Buffering no;

          # Connexions keep-alive pour SSE
          proxy_set_header   Connection        "";
        }

        # Health check nginx
        location /nginx-health {
          return 200 "ok\n";
          add_header Content-Type text/plain;
        }
      }
    }